<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Pizza Solidaria Epuyen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        /* Animación de carga */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #ea580c;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-center">
        <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-slate-200">
            
            <!-- Header -->
            <div class="bg-orange-600 p-6 text-white text-center">
                <h1 class="text-2xl font-bold">🍕 Tomar Pedido</h1>
                <p class="text-orange-100 text-sm mt-1">Operación Solidaria Epuyen</p>
            </div>

            <!-- Formulario -->
            <form id="pedidoForm" class="p-6 space-y-4">
                
                <!-- Nombre -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" name="nombre" required placeholder="Ej: Juan Pérez" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
                </div>

                <!-- Cantidad -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Cantidad de Pizzas</label>
                    <input type="number" name="cantidad" required min="1" value="1" class="w-full p-3 border border-gray-300 rounded-lg font-bold text-lg text-orange-600 focus:ring-2 focus:ring-orange-500 outline-none">
                </div>

                <!-- Dirección -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Dirección Exacta</label>
                    <input type="text" name="direccion" required placeholder="Ej: Calle 10 N° 234, La Plata" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                </div>

                <!-- Entre Calles -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Entre Calles</label>
                    <input type="text" name="entre_calles" required placeholder="Ej: 45 y 46" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                </div>

                <!-- Teléfono -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">WhatsApp / Teléfono</label>
                    <input type="tel" name="telefono" required placeholder="Ej: 54 9 221 6784252" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                    <p class="text-xs text-gray-400 mt-1">Sin 0 y sin 15 preferentemente.</p>
                </div>

                <!-- Observaciones -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Observaciones</label>
                    <textarea name="observaciones" rows="2" placeholder="Ej: Casa de rejas negras, timbre no anda." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
                </div>

                <!-- Botón Enviar -->
                <div class="pt-2">
                    <button type="submit" id="btnSubmit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-4 rounded-lg shadow transition-colors flex justify-center items-center gap-2">
                        <span>Confirmar Pedido</span>
                    </button>
                </div>
            </form>

            <!-- Mensaje Exito -->
            <div id="successMessage" class="hidden p-8 text-center">
                <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800">¡Pedido Registrado!</h3>
                <p class="text-gray-600 mt-2">Los datos se guardaron correctamente en la planilla.</p>
                <button onclick="window.location.reload()" class="mt-6 text-orange-600 font-bold hover:underline">Cargar otro pedido</button>
            </div>

        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKuP7BQOaI357yJ3lVsgo88qkvvzofzrGHM0EqYKQdAVYs_wqByM7Ej8Rlv81C92JSFw/exec";
        // ---------------------

        const form = document.getElementById('pedidoForm');
        const btn = document.getElementById('btnSubmit');
        const successDiv = document.getElementById('successMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Validar URL
            if (SCRIPT_URL === "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI" || SCRIPT_URL === "") {
                alert("Falta configurar la URL del Script. Revisa las instrucciones.");
                return;
            }

            // UI Loading
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> Registrando...';

            // Capturar datos
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            // Agregar fecha automática
            data.fecha = new Date().toLocaleString("es-AR");

            // Enviar a Google Sheets
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Importante para Apps Script
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                // Con mode: 'no-cors' no podemos leer la respuesta, asumimos éxito si no hay error de red.
                form.classList.add('hidden');
                successDiv.classList.remove('hidden');
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Hubo un error al guardar. Revisa tu conexión.");
                btn.disabled = false;
                btn.innerHTML = 'Confirmar Pedido';
            });
        });
    </script>
</body>
</html>
